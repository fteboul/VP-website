<!-- Marked library from CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  function renderContent(lang) {
    const content = lang === 'en' ? CONTENT_EN : CONTENT_FR;
    const t = I18N[lang];

    document.querySelectorAll("[data-content]").forEach(el => {
      const key = el.dataset.content;
      if (content[key]) {
        el.innerHTML = key.endsWith("_md") ? marked.parse(content[key]) : content[key];
      }
    });

    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.dataset.i18n;
      if (t[key]) el.textContent = t[key];
    });

    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (t[key]) el.placeholder = t[key];
    });

    document.querySelectorAll("[data-i18n-aria]").forEach(el => {
      const key = el.dataset.i18nAria;
      if (t[key]) el.setAttribute('aria-label', t[key]);
    });

    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  const savedLang = localStorage.getItem('vp-lang') || 'fr';
  renderContent(savedLang);

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.dataset.lang;
      localStorage.setItem('vp-lang', lang);
      renderContent(lang);
    });
  });
</script>
